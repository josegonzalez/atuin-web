<div class="modal fade" id="errorDetailModal" tabindex="-1" aria-labelledby="errorDetailModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content" style="background: var(--surface-100); border-color: var(--bs-border-color);">
      <div class="modal-header" style="border-color: var(--bs-border-color);">
        <h5 class="modal-title" id="errorDetailModalLabel">Record Decode Error</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <p class="text-secondary" style="font-size: 0.875rem;">
          PASETO decryption succeeded but the inner payload could not be decoded.
          The full record details are shown below.
        </p>
        <pre id="errorDetailContent" class="font-mono p-3" style="background: var(--surface-200); border: 1px solid var(--bs-border-color); border-radius: 0.375rem; max-height: 60vh; overflow: auto; white-space: pre-wrap; word-break: break-all; font-size: 0.8125rem;"></pre>
      </div>
      <div class="modal-footer" style="border-color: var(--bs-border-color);">
        <button type="button" class="btn btn-outline-secondary" onclick="navigator.clipboard.writeText(document.getElementById('errorDetailContent').textContent).then(function(){var t=document.getElementById('copyToast');if(t)bootstrap.Toast.getOrCreateInstance(t).show()})">Copy JSON</button>
        <button type="button" class="btn btn-brand" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>
