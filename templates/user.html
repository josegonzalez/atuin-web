<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ username }} - Atuin Web</title>
  <link rel="stylesheet" href="/assets/css/bootstrap.min.css">
  <link rel="stylesheet" href="/assets/css/app.css">
  <script src="/assets/js/theme.js"></script>
</head>
<body>
  <div class="login-container">
    <div class="login-card" style="max-width: 500px;">
      <div class="login-title">{{ username }}</div>
      <div class="login-subtitle">User Profile</div>

      {% if user is mapping %}
        <div class="table-responsive">
          <table class="table table-hover mb-0">
            <tbody>
              {% for key, value in user | items %}
              <tr>
                <td class="font-mono fw-bold">{{ key }}</td>
                <td class="font-mono">{{ value }}</td>
              </tr>
              {% endfor %}
            </tbody>
          </table>
        </div>
      {% else %}
        <p class="text-secondary text-center">User not found.</p>
      {% endif %}

      <div class="mt-3 text-center">
        <a href="/" class="btn btn-sm btn-outline-secondary">Back to Dashboard</a>
      </div>
    </div>
  </div>

  <script src="/assets/js/bootstrap.bundle.min.js"></script>
</body>
</html>
