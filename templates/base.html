<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <title>{% block title %}Atuin Web{% endblock %}</title>
  <link rel="stylesheet" href="/assets/css/bootstrap.min.css">
  <link rel="stylesheet" href="/assets/css/app.css">
  <script src="/assets/js/theme.js"></script>
</head>
<body>
  {% block body %}
  <button class="sidebar-toggle" onclick="document.querySelector('.sidebar').classList.toggle('show')" aria-label="Toggle navigation">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
  </button>

  <div class="app-wrapper">
    {% include "partials/sidebar.html" %}

    <main class="main-content">
      <div class="content-header">
        <h1>{% block page_title %}{% endblock %}</h1>
      </div>
      <div class="content-body">
        {% block content %}{% endblock %}
      </div>
      <footer class="app-footer">
        <a href="https://github.com/josegonzalez/atuin-web" target="_blank" rel="noopener noreferrer">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
          josegonzalez/atuin-web
        </a>
      </footer>
    </main>
  </div>

  {% include "partials/key_modal.html" %}
  {% include "partials/error_detail_modal.html" %}

  <div class="toast-container position-fixed bottom-0 end-0 p-3 toast-overlay" id="toastContainer">
    <div id="copyToast" class="toast align-items-center text-bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true" data-bs-delay="2000">
      <div class="d-flex">
        <div class="toast-body">Copied to clipboard</div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
      </div>
    </div>
  </div>
  {% endblock %}

  <script src="/assets/js/bootstrap.bundle.min.js"></script>
  <script src="/assets/js/htmx.min.js"></script>
  <script src="/assets/js/msgpack.min.js"></script>
  <script src="/assets/js/bip39.min.js"></script>
  <script src="/assets/js/blake2b.min.js"></script>
  <script src="/assets/js/paseto-v4.js"></script>
  <script src="/assets/js/decrypt.js"></script>
  <script>
  (function() {
    var sidebar = document.querySelector('.sidebar');
    var main = document.querySelector('.main-content');
    var btn = document.getElementById('sidebarCollapseBtn');
    if (!sidebar || !main) return;

    function applyCollapsed(collapsed, animate) {
      if (!animate) {
        sidebar.style.transition = 'none';
        main.style.transition = 'none';
      }
      sidebar.classList.toggle('collapsed', collapsed);
      main.classList.toggle('sidebar-collapsed', collapsed);
      if (btn) {
        var label = collapsed ? 'Expand sidebar' : 'Collapse sidebar';
        btn.title = label;
        btn.setAttribute('aria-label', label);
      }
      if (!animate) {
        requestAnimationFrame(function() {
          requestAnimationFrame(function() {
            sidebar.style.transition = '';
            main.style.transition = '';
          });
        });
      }
    }

    var stored = localStorage.getItem('atuin-sidebar-collapsed');
    if (stored === 'true') {
      applyCollapsed(true, false);
    }

    window.toggleSidebar = function() {
      var collapsed = !sidebar.classList.contains('collapsed');
      applyCollapsed(collapsed, true);
      localStorage.setItem('atuin-sidebar-collapsed', collapsed);
    };
  })();
  </script>
</body>
</html>
